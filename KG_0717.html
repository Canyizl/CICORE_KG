<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI智慧交投 - 智慧大屏</title>
  <!-- Bootstrap5 CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- D3.js 图谱渲染 -->
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #050c1a;
      color: #fff;
      font-family: "Microsoft YaHei", sans-serif;
    }
    /* 顶部标题栏 */
    .header-bar {
      height: 8vh;
      background: linear-gradient(90deg, #082042, #0f346d, #082042);
      border-bottom: 1px solid #00a8ff;
      display:flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 15px #00a8ff40;
    }
    .main-title {
      font-size: 2.2rem;
      font-weight: bold;
      color: #00e5ff;
      letter-spacing: 8px;
      text-shadow: 0 0 10px #00e5ff;
    }
    /* 主体内容区域 占92vh */
    .main-container {
      height: 92vh;
      display: flex;
      gap: 16px;
      padding: 16px;
    }
    /* 左侧知识图谱容器 */
    .graph-wrap {
      width: 48%;
      height: 100%;
      border: 1px solid #0088ff60;
      border-radius: 8px;
      background: #061024;
      box-shadow: inset 0 0 30px #0066ff20, 0 0 12px #0088ff30;
      position: relative;
      overflow: hidden;
    }
    .graph-title {
      height: 40px;
      line-height: 40px;
      text-align: center;
      background: #0a1c38;
      border-bottom: 1px solid #0088ff40;
      color: #7cd0ff;
    }
    #neo4j-graph {
      width: 100%;
      height: calc(100% - 40px);
      position: relative;
    }
    /* 图谱连线、文字 */
    .link-line {
      stroke: #6cf;
      stroke-width: 2;
      opacity: 0.7;
    }
    /* 连线关系标签 */
    .link-rel-text {
      fill: #00e5ff;
      font-size: 12px;
      text-anchor: middle;
      background: #000;
    }
    .node-text {
      fill: #fff;
      font-size: 12px;
      text-anchor: middle;
    }
    /* 节点右键操作菜单 */
    .node-menu {
      position: absolute;
      background: #0a1c38;
      border: 1px solid #00e5ff80;
      border-radius: 6px;
      padding: 6px 0;
      z-index: 999;
      min-width: 100px;
      display: none;
    }
    .node-menu-item {
      padding: 6px 12px;
      cursor: pointer;
      font-size: 13px;
      color: #b8e8ff;
    }
    .node-menu-item:hover {
      background: #0088ff40;
      color: #fff;
    }
    /* 右侧整体容器 */
    .right-wrap {
      width: 50%;
      height: 100%;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    /* 数字人区域 3/4高度 */
    .digital-human-wrap {
      height: 75%;
      border: 1px solid #00e5ff60;
      border-radius: 8px;
      background: #061024;
      box-shadow: inset 0 0 30px #00e5ff20, 0 0 12px #00e5ff30;
      position: relative;
      overflow: hidden;
    }
    .human-title {
      height: 40px;
      line-height: 40px;
      text-align: center;
      background: #0a1c38;
      border-bottom: 1px solid #00e5ff40;
      color: #7cf0ff;
    }
    #digital-human-box {
      width: 100%;
      height: calc(100% - 40px);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #7cf0ff;
      font-size: 18px;
    }
    /* 对话区域 1/4高度 */
    .chat-wrap {
      height: 25%;
      border: 1px solid #00ffc860;
      border-radius: 8px;
      background: #061226;
      padding: 12px;
      display: flex;
      flex-direction: column;
    }
    /* 发言人栏 水平布局 */
    .chat-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }
    .chat-speaker {
      font-size: 1.1rem;
      color: #00ffc8;
      font-weight: bold;
    }
    /* 音频控制喇叭按钮 */
    .audio-control-btn {
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid #00ffc8;
      border-radius: 4px;
      color: #00ffc8;
      font-size: 16px;
      cursor: pointer;
      user-select: none;
    }
    .audio-control-btn:hover {
      background: #00ffc830;
    }
    .chat-content-box {
      flex: 1;
      border: 1px dashed #00ffc840;
      border-radius: 6px;
      padding: 10px;
      overflow-y: auto;
      color: #e6fff9;
    }
    /* 滚动条美化 */
    .chat-content-box::-webkit-scrollbar {
      width: 4px;
    }
    .chat-content-box::-webkit-scrollbar-thumb {
      background: #00ffc860;
      border-radius: 2px;
    }
  </style>
</head>
<body>
  <!-- 顶部标题栏 -->
  <header class="header-bar">
    <h1 class="main-title">AI智慧交投</h1>
  </header>
  <!-- 主内容区 -->
  <div class="main-container">
    <!-- 左侧 Neo4j知识图谱容器 -->
    <div class="graph-wrap">
      <div class="graph-title">交投知识图谱（Neo4j）</div>
      <div id="neo4j-graph">
        <!-- 节点操作悬浮菜单 新增播放音频项 -->
        <div class="node-menu" id="nodeMenu">
          <div class="node-menu-item" data-action="expand">展开</div>
          <div class="node-menu-item" data-action="collapse">收缩</div>
          <div class="node-menu-item" data-action="intro">介绍</div>
          <div class="node-menu-item" data-action="playAudio">播放音频</div>
        </div>
      </div>
    </div>
    <!-- 右侧：数字人 + 对话区 -->
    <div class="right-wrap">
      <!-- 数字人展示 3/4高度 -->
      <div class="digital-human-wrap">
        <div class="human-title">AI数字人交互终端</div>
        <div id="digital-human-box">数字人渲染占位区域</div>
      </div>
      <!-- 对话弹窗 1/4高度 -->
      <div class="chat-wrap">
        <!-- 发言人头部栏：文字+喇叭按钮同行 -->
        <div class="chat-header">
          <div class="chat-speaker">发言人：CICO</div>
          <!-- 喇叭静音切换按钮 -->
          <div class="audio-control-btn" id="audioBtn">🔊</div>
        </div>
        <div class="chat-content-box" id="chat-text">
          <p>等待数字人应答...</p>
        </div>
      </div>
    </div>
  </div>
  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    // ===================== 全局音频实例 新增 =====================
    let globalAudio = new Audio();
    const audioBtn = document.getElementById("audioBtn");
    // 喇叭图标常量
    const ICON_VOLUME = "🔊"; // 有声
    const ICON_MUTE = "🔇";  // 静音/暂停

    // 一键暂停所有音频，重置播放进度
    function stopCurrentAudio() {
      if (!globalAudio.paused) {
        globalAudio.pause();
        globalAudio.currentTime = 0;
        audioBtn.textContent = ICON_MUTE;
        updateChatText(`CICO：已暂停全部音频播放`);
      }
    }

    // 喇叭按钮点击事件：暂停音频
    audioBtn.addEventListener("click", () => {
      stopCurrentAudio();
    });

    // 监听音频播放事件，切换喇叭图标
    globalAudio.addEventListener("play", () => {
      audioBtn.textContent = ICON_VOLUME;
    });
    globalAudio.addEventListener("pause", () => {
      audioBtn.textContent = ICON_MUTE;
    });

    // ===================== 1. 数据层：Excel数据源（新增audioUrl音频地址字段） =====================
    /**
     * 模拟Excel原始数据，完全匹配Excel表格结构，后续可直接读取真实Excel替换
     * 字段说明：
     *  parentName: 父节点名称
     *  rel: 父子节点关系（连线显示的文本）
     *  childName: 子节点名称
     *  parentIntro: 父节点介绍文本（点击介绍按钮展示）
     *  childIntro: 子节点介绍文本（点击介绍按钮展示）
     *  parentAudio: 父节点音频文件地址
     *  childAudio: 子节点音频文件地址
     */
    const excelRawData = [
      { 
        parentName: "集团总部", 
        rel: "子公司", 
        childName: "技术总院", 
        parentIntro: "集团总部是交投集团的核心管理机构，负责集团整体战略规划、投融资管理与运营管控，是集团的决策中枢。",
        childIntro: "技术总院是交投集团的核心技术研发机构，负责交通领域前沿技术研发、智慧交通项目落地与技术成果转化。",
        parentAudio: "./audio/1.mp3",
        childAudio: "./audio/2.mp3"
      },
      { 
        parentName: "集团总部", 
        rel: "子公司", 
        childName: "浙商证券",
        parentIntro: "集团总部是交投集团的核心管理机构，负责集团整体战略规划、投融资管理与运营管控，是集团的决策中枢。",
        childIntro: "浙商证券是交投集团旗下上市金融平台，专注于证券经纪、投资银行、资产管理、私募股权投资等金融业务。",
        parentAudio: "./audio/1.mp3",
        childAudio: "./audio/2.mp3"
      }
    ];
    // 全局完整图谱数据（原始总数据，不做删减）
    let fullGraphData = { nodes: [], links: [] };
    // 当前渲染展示图谱数据
    let showGraphData = { nodes: [], links: [] };
    // 记录节点展开状态（默认全部收缩，仅根节点初始可展开）
    const nodeExpandStatus = new Map();
    // 当前选中操作节点
    let currentOperateNode = null;
    // 节点操作菜单DOM
    const nodeMenu = document.getElementById("nodeMenu");
    // ===================== 2. 数据解析工具函数（Excel转图谱结构） =====================
    /**
     * 解析Excel数组，生成标准nodes、links图谱数据，绑定Intro介绍文本+音频地址
     * @param {Array} excelArr 模拟Excel行数据
     * @returns {Object} {nodes, links}
     */
    function parseExcelToGraph(excelArr) {
      const nodeMap = new Map();
      const links = [];
      let nodeId = 1;
      // 生成唯一节点ID
      const getNodeId = (name) => {
        if (!nodeMap.has(name)) {
          nodeMap.set(name, nodeId++);
        }
        return nodeMap.get(name);
      };
      // 遍历Excel数据，生成节点和连线
      excelArr.forEach(row => {
        const pId = getNodeId(row.parentName);
        const cId = getNodeId(row.childName);
        // 生成连线，绑定关系、Intro、音频地址
        links.push({
          source: pId,
          target: cId,
          rel: row.rel,
          parentName: row.parentName,
          childName: row.childName,
          parentIntro: row.parentIntro,
          childIntro: row.childIntro,
          parentAudio: row.parentAudio,
          childAudio: row.childAudio
        });
      });
      // 生成节点数组，绑定Intro介绍文本+音频地址
      const nodes = Array.from(nodeMap.entries()).map(([name, id]) => {
        // 节点默认全部收缩，仅根节点（集团总部）初始可展开
        nodeExpandStatus.set(name, false);
        // 匹配节点对应的音频地址
        let nodeAudioUrl = "";
        if(name === "集团总部"){
          nodeAudioUrl = links.find(l => l.parentName === name)?.parentAudio || "";
        }else{
          nodeAudioUrl = links.find(l => l.childName === name)?.childAudio || "";
        }
        return {
          id,
          name,
          type: name === "集团总部" ? "group" : "org",
          intro: name === "集团总部" 
            ? links.find(l => l.parentName === name)?.parentIntro || ""
            : links.find(l => l.childName === name)?.childIntro || "",
          audioUrl: nodeAudioUrl // 节点音频地址
        };
      });
      return { nodes, links };
    }
    /**
     * 根据节点展开状态过滤需要渲染的节点/连线（核心：初始仅显示根节点）
     */
    function filterGraphByExpandStatus() {
      const showNodeNames = new Set();
      // 1. 初始强制加入根节点（集团总部），保证初始状态仅显示根节点
      showNodeNames.add("集团总部");
      // 2. 递归遍历，根据展开状态判断是否显示子节点
      function checkChild(parentName) {
        if (!nodeExpandStatus.get(parentName)) return;
        fullGraphData.links.forEach(link => {
          if (link.parentName === parentName) {
            showNodeNames.add(link.childName);
            checkChild(link.childName);
          }
        });
      }
      checkChild("集团总部");
      // 3. 过滤节点和连线
      showGraphData.nodes = fullGraphData.nodes.filter(n => showNodeNames.has(n.name));
      showGraphData.links = fullGraphData.links.filter(l =>
        showNodeNames.has(l.parentName) && showNodeNames.has(l.childName)
      );
    }
    // ===================== 3. 图谱渲染核心函数 =====================
    function getNodeColor(type) {
      switch (type) {
        case "group": return "#0088ff"; // 根节点蓝色
        case "org": return "#00ffc8";  // 子节点青色
        default: return "#fff";
      }
    }
    function renderGraph() {
      const container = document.getElementById("neo4j-graph");
      const width = container.clientWidth;
      const height = container.clientHeight;
      // 清空旧画布
      d3.select("#neo4j-graph svg").remove();
      const svg = d3.select("#neo4j-graph")
        .append("svg")
        .attr("width", width)
        .attr("height", height);
      // 力学布局
      const simulation = d3.forceSimulation(showGraphData.nodes)
        .force("link", d3.forceLink(showGraphData.links).id(d => d.id).distance(200))
        .force("charge", d3.forceManyBody().strength(-500))
        .force("center", d3.forceCenter(width / 2, height / 2));
      // 1. 绘制连线
      const link = svg.append("g")
        .selectAll("line")
        .data(showGraphData.links)
        .enter()
        .append("line")
        .attr("class", "link-line");
      // 2. 绘制连线关系标签（展开后显示关系名称）
      const linkRelText = svg.append("g")
        .selectAll("text")
        .data(showGraphData.links)
        .enter()
        .append("text")
        .attr("class", "link-rel-text")
        .text(d => d.rel);
      // 3. 绘制节点圆
      const node = svg.append("g")
        .selectAll("circle")
        .data(showGraphData.nodes)
        .enter()
        .append("circle")
        .attr("r", 32)
        .attr("fill", d => getNodeColor(d.type))
        .call(d3.drag()
          .on("start", dragstarted)
          .on("drag", dragged)
          .on("end", dragended))
        .on("click", function (event, d) {
          // 点击节点弹出操作菜单
          event.stopPropagation();
          currentOperateNode = d;
          const rect = this.getBoundingClientRect();
          const containerRect = document.getElementById("neo4j-graph").getBoundingClientRect();
          nodeMenu.style.left = (rect.left - containerRect.left + 40) + "px";
          nodeMenu.style.top = (rect.top - containerRect.top - 30) + "px";
          nodeMenu.style.display = "block";
        });
      // 4. 绘制节点文字
      const text = svg.append("g")
        .selectAll("text")
        .data(showGraphData.nodes)
        .enter()
        .append("text")
        .attr("class", "node-text")
        .text(d => d.name);
      // 力学更新每一帧
      simulation.on("tick", () => {
        // 更新连线位置
        link
          .attr("x1", d => d.source.x)
          .attr("y1", d => d.source.y)
          .attr("x2", d => d.target.x)
          .attr("y2", d => d.target.y);
        // 更新连线关系标签位置（连线中点）
        linkRelText
          .attr("x", d => (d.source.x + d.target.x) / 2)
          .attr("y", d => (d.source.y + d.target.y) / 2 - 8);
        // 更新节点位置
        node
          .attr("cx", d => d.x = Math.max(35, Math.min(width - 35, d.x)))
          .attr("cy", d => d.y = Math.max(35, Math.min(height - 35, d.y)));
        // 更新节点文字位置
        text
          .attr("x", d => d.x)
          .attr("y", d => d.y + 6);
      });
      // 拖拽逻辑
      function dragstarted(event, d) {
        if (!event.active) simulation.alphaTarget(0.3).restart();
        d.fx = d.x; d.fy = d.y;
      }
      function dragged(event, d) {
        d.fx = event.x; d.fy = event.y;
      }
      function dragended(event, d) {
        if (!event.active) simulation.alphaTarget(0);
        d.fx = null; d.fy = null;
      }
    }
    // 点击空白区域关闭菜单
    document.getElementById("neo4j-graph").addEventListener("click", (e) => {
      if (e.target.id === "neo4j-graph") nodeMenu.style.display = "none";
    });
    // ===================== 4. 节点菜单动作处理 新增playAudio分支 =====================
    document.querySelectorAll(".node-menu-item").forEach(item => {
      item.addEventListener("click", () => {
        const action = item.dataset.action;
        const nodeName = currentOperateNode.name;
        const nodeIntro = currentOperateNode.intro;
        const audioSrc = currentOperateNode.audioUrl;
        nodeMenu.style.display = "none";
        switch (action) {
          case "expand":
            // 展开节点：设置展开状态为true，重新过滤渲染
            nodeExpandStatus.set(nodeName, true);
            filterGraphByExpandStatus();
            renderGraph();
            updateChatText(`CICO：已展开【${nodeName}】所有下属节点`);
            break;
          case "collapse":
            // 收缩节点：设置展开状态为false，重新过滤渲染
            nodeExpandStatus.set(nodeName, false);
            filterGraphByExpandStatus();
            renderGraph();
            updateChatText(`CICO：已收缩【${nodeName}】下属节点`);
            break;
          case "intro":
            // 介绍节点：展示节点绑定的Intro文本
            updateChatText(`CICO：【${nodeName}】介绍：${nodeIntro}`);
            break;
          case "playAudio":
            // 播放节点音频 新增逻辑
            if(!audioSrc){
              updateChatText(`CICO：【${nodeName}】暂无绑定音频文件`);
              return;
            }
            stopCurrentAudio();
            globalAudio.src = audioSrc;
            globalAudio.play().then(()=>{
              updateChatText(`CICO：正在播放【${nodeName}】音频，音频地址：${audioSrc}`);
            }).catch(err=>{
              updateChatText(`CICO：音频播放失败，错误信息：${err.message}`);
            });
            break;
        }
      });
    });
    // ===================== 5. 对话框公共方法 =====================
    function updateChatText(text) {
      const chatBox = document.getElementById("chat-text");
      const p = document.createElement("p");
      p.textContent = text;
      chatBox.appendChild(p);
      chatBox.scrollTop = chatBox.scrollHeight;
    }
    // ===================== 6. 数字人初始化占位 =====================
    function initDigitalHuman() {
      console.log("数字人容器初始化完成");
    }
    // ===================== 7. 页面入口初始化 =====================
    window.onload = function () {
      // 1. 解析Excel数据生成完整图谱
      fullGraphData = parseExcelToGraph(excelRawData);
      // 2. 过滤初始渲染节点（仅显示根节点）
      filterGraphByExpandStatus();
      // 3. 渲染图谱
      renderGraph();
      // 4. 初始化数字人
      initDigitalHuman();
      // 初始提示消息
      updateChatText("CICO：知识图谱加载完成，初始仅显示根节点，点击节点可展开/收缩/查看节点介绍/播放节点音频，右上角喇叭按钮可一键暂停所有音频");
    }
  </script>
</body>
</html>
